<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spring Dev - Security Learning</title>
    <style>
        body {
          background-color: #ffffff;
          color: #000000;
          font-family: Arial, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
        }
        .container {
          text-align: center;
          border: 2px solid #000000;
          padding: 40px;
          border-radius: 8px;
          background-color: #f9f9f9;
          box-shadow: 4px 4px 0px #000000;
        }
        h1 {
          font-size: 2.5em;
          margin-bottom: 20px;
          letter-spacing: 2px;
        }
        p {
          font-size: 1.2em;
          margin-top: 10px;
          color: #333333;
        }
        .line {
          width: 60%;
          height: 2px;
          background-color: #000000;
          margin: 20px auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to Spring Dev</h1>
    <div class="line"></div>
    <p>Spring Security Learning Application</p>
</div>
</body>
</html>
